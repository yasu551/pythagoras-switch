<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コロコロスイッチ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
    }
    canvas { display: block; }
    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      background: #0a0a0f;
      transition: opacity 0.5s ease-out;
    }
    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #overlay h1 {
      color: #fff;
      font-size: 52px;
      letter-spacing: 8px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    #overlay .subtitle {
      color: #888;
      font-size: 14px;
      letter-spacing: 4px;
      margin-bottom: 60px;
    }
    #start-btn {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: #c0392b;
      border: 3px solid #e74c3c;
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
      box-shadow: 0 4px 20px rgba(231, 76, 60, 0.3);
    }
    #start-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 30px rgba(231, 76, 60, 0.5);
    }
    #replay-btn {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      padding: 12px 32px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      border-radius: 8px;
      display: none;
      transition: background 0.15s;
    }
    #replay-btn:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div id="overlay">
    <h1>コロコロスイッチ</h1>
    <div class="subtitle">KOROKORO SWITCH</div>
    <button id="start-btn">スタート</button>
  </div>
  <button id="replay-btn">もう一度</button>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
